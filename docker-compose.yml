services:
  neo4j:
    image: neo4j:5
    container_name: medmemory-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/medmemory123"
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -a bolt://localhost:7687 -u neo4j -p medmemory123 'RETURN 1' > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  api:
    build:
      context: .
      dockerfile: code/server/Dockerfile
    container_name: medmemory-api
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      JWT_SECRET: medmemory-dev-secret
      JWT_EXPIRES_IN: 8h
      OTP_EXPIRY_MINUTES: 5
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: medmemory123
      NEO4J_DATABASE: neo4j
      ANTHROPIC_API_KEY: demo-key
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build:
      context: .
      dockerfile: code/client/Dockerfile
    container_name: medmemory-client
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:3001/api/v1
    depends_on:
      api:
        condition: service_healthy

volumes:
  neo4j_data:
